<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Piket OSIS v3 - Edit Mode</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SheetJS untuk export Excel Multi-Sheet -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f8f9fa; padding: 20px 0; }
        .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border: none; }
        .nav-pills .nav-link { border-radius: 8px; font-weight: 600; color: #495057; background-color: #e9ecef; margin: 2px; }
        .nav-pills .nav-link.active { background-color: #0d6efd; color: white; }
        .piket-header { background-color: #e7f1ff; color: #0c63e4; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .table-responsive { max-height: 350px; overflow-y: auto; }
        .btn-edit { background-color: #ffc107; color: #000; border: none; padding: 2px 8px; font-size: 0.85rem; border-radius: 4px; }
        .btn-delete { background-color: #dc3545; color: #fff; border: none; padding: 2px 8px; font-size: 0.85rem; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-8">
            <div class="card p-4 bg-white mb-4">
                <h3 class="text-center text-primary mb-4 fw-bold">ABSENSI PIKET OSIS</h3>
                
                <!-- MENU 3 BAGIAN UTAMA -->
                <label class="form-label fw-bold d-block text-center mb-2">Pilih Bagian Tugas Piket:</label>
                <ul class="nav nav-pills nav-justified mb-4" id="piketTab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" onclick="setBagian('Piket Menyambut')">🤝 Menyambut</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" onclick="setBagian('Piket Jaga Tangga')">🪜 Jaga Tangga</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" onclick="setBagian('Piket Persiapan Sholat')">🕌 Persiapan Sholat</button>
                    </li>
                </ul>

                <div id="statusBagian" class="piket-header">Bagian: Piket Menyambut</div>

                <!-- FORM ABSENSI -->
                <form id="absenForm">
                    <!-- ID Tersembunyi untuk melacak baris yang sedang diedit -->
                    <input type="hidden" id="editIndex" value="-1">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tanggal Absen</label>
                        <input type="date" id="tanggal" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nama Lengkap Anggota</label>
                        <input type="text" id="nama" class="form-control" placeholder="Masukkan nama Anda" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Jabatan / Kelas</label>
                        <input type="text" id="jabatan" class="form-control" placeholder="Contoh: Sekbid 1 / Kelas XI-A" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Status Kehadiran Piket</label>
                        <select id="status" class="form-select" required>
                            <option value="Hadir Tepat Waktu" selected>Hadir Tepat Waktu</option>
                            <option value="Hadir Terlambat">Hadir Terlambat</option>
                            <option value="Izin (Ada Pengganti)">Izin (Ada Pengganti)</option>
                            <option value="Sakit">Sakit</option>
                            <option value="Alpa / Tidak Hadir">Alpa / Tidak Hadir</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Catatan Atribut / Seragam</label>
                        <input type="text" id="kolomTambahan" class="form-control" placeholder="Contoh: Lengkap / Atribut Kurang">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Laporan / Keterangan Kondisi</label>
                        <textarea id="keterangan" class="form-control" rows="2" placeholder="Contoh: Aman, atau alasan jika tidak hadir."></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary w-100 fw-bold py-2 mb-3">SIMPAN ABSEN PIKET</button>
                    <button type="button" id="cancelEditBtn" class="btn btn-light w-100 fw-bold py-2 mb-3 d-none" onclick="batalEdit()">Batal Edit</button>
                </form>
            </div>

            <!-- LIVE PREVIEW TABEL DENGAN OPSI AKSI -->
            <div class="card p-4 bg-white mb-4">
                <h5 class="fw-bold text-secondary mb-3">📋 Data Semua Absen Masuk</h5>
                <div class="table-responsive">
                    <table class="table table-striped table-bordered text-nowrap align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Aksi</th>
                                <th>Tanggal</th>
                                <th>Bagian</th>
                                <th>Nama</th>
                                <th>Status</th>
                                <th>Keterangan</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Baris otomatis bertambah di sini -->
                        </tbody>
                    </table>
                </div>
                <div class="mt-3">
                    <button onclick="downloadExcelTerpisah()" class="btn btn-success w-100 fw-bold py-2">
                        📥 DOWNLOAD EXCEL (OTOMATIS TERPISAH PER MENU)
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    let bagianAktif = "Piket Menyambut";

    function setBagian(namaBagian) {
        bagianAktif = namaBagian;
        document.getElementById("statusBagian").innerText = "Bagian: " + namaBagian;
        const buttons = document.querySelectorAll("#piketTab .nav-link");
        buttons.forEach(btn => {
            if (btn.innerText.includes(namaBagian.replace("Piket ", ""))) btn.classList.add("active");
            else btn.classList.remove("active");
        });
    }

    function setTanggalHariIni() {
        const d = new Date();
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        document.getElementById('tanggal').value = `${yyyy}-${mm}-${dd}`;
    }

    document.addEventListener("DOMContentLoaded", function() {
        setTanggalHariIni();
        if(!localStorage.getItem("dataPiketOSIS")) {
            localStorage.setItem("dataPiketOSIS", JSON.stringify([]));
        }
        updateLiveTable();
    });

    // PROSES SIMPAN / UPDATE DATA
    document.getElementById("absenForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        const editIndex = parseInt(document.getElementById("editIndex").value);
        const tanggal = document.getElementById("tanggal").value;
        const nama = document.getElementById("nama").value;
        const jabatan = document.getElementById("jabatan").value;
        const status = document.getElementById("status").value;
        const infoTambahan = document.getElementById("kolomTambahan").value || "-";
        const keterangan = document.getElementById("keterangan").value || "Aman";
        
        const database = JSON.parse(localStorage.getItem("dataPiketOSIS")) || [];

        if (editIndex === -1) {
            // MODE INPUT BARU
            const jamInput = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const dataBaru = {
                Tanggal: tanggal,
                Jam: jamInput,
                Bagian_Piket: bagianAktif,
                Nama_Anggota: nama,
                Jabatan_Kelas: jabatan,
                Status: status,
                Catatan_Seragam: infoTambahan,
                Keterangan: keterangan
            };
            database.push(dataBaru);
            alert(`Absen berhasil disimpan untuk ${nama}!`);
        } else {
            // MODE EDIT DATA LAMA
            database[editIndex].Tanggal = tanggal;
            database[editIndex].Bagian_Piket = bagianAktif;
            database[editIndex].Nama_Anggota = nama;
            database[editIndex].Jabatan_Kelas = jabatan;
            database[editIndex].Status = status;
            database[editIndex].Catatan_Seragam = infoTambahan;
            database[editIndex].Keterangan = keterangan;
            alert(`Data ${nama} berhasil diperbarui!`);
        }

        localStorage.setItem("dataPiketOSIS", JSON.stringify(database));
        resetFormFormulir();
        updateLiveTable();
    });

    // FUNGSI UNTUK MEMICU MODE EDIT
    function editData(index) {
        const database = JSON.parse(localStorage.getItem("dataPiketOSIS")) || [];
        const item = database[index];

        // Isi formulir dengan data lama
        document.getElementById("editIndex").value = index;
        document.getElementById("tanggal").value = item.Tanggal;
        document.getElementById("nama").value = item.Nama_Anggota;
        document.getElementById("jabatan").value = item.Jabatan_Kelas;
        document.getElementById("status").value = item.Status;
        document.getElementById("kolomTambahan").value = item.Catatan_Seragam;
        document.getElementById("keterangan").value = item.Keterangan;

        // Ubah submenu tab aktif sesuai data yang mau diedit
        setBagian(item.Bagian_Piket);

        // Ubah teks tombol utama
        document.getElementById("submitBtn").innerText = "UPDATE DATA ABSEN";
        document.getElementById("submitBtn").classList.replace("btn-primary", "btn-warning");
        document.getElementById("cancelEditBtn").classList.remove("d-none");

        // Scroll otomatis ke atas agar fokus ke form
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // FUNGSI UNTUK MENGHAPUS DATA
    function hapusData(index) {
        if(confirm("Apakah Anda yakin ingin menghapus baris absen ini?")) {
            const database = JSON.parse(localStorage.getItem("dataPiketOSIS")) || [];
            database.splice(index, 1);
            localStorage.setItem("dataPiketOSIS", JSON.stringify(database));
            updateLiveTable();
            if(document.getElementById("editIndex").value == index) {
                batalEdit();
            }
        }
    }

    function batalEdit() {
        resetFormFormulir();
    }

    function resetFormFormulir() {
        document.getElementById("editIndex").value = "-1";
        document.getElementById("nama").value = "";
        document.getElementById("jabatan").value = "";
        document.getElementById("kolomTambahan").value = "";
        document.getElementById("keterangan").value = "";
        setTanggalHariIni();

        document.getElementById("submitBtn").innerText = "SIMPAN ABSEN PIKET";
        document.getElementById("submitBtn").classList.replace("btn-warning", "btn-primary");
        document.getElementById("cancelEditBtn").classList.add("d-none");
    }

    // UPDATE TABEL LIVE DENGAN INDEX ASLI
    function updateLiveTable() {
        const database = JSON.parse(localStorage.getItem("dataPiketOSIS")) || [];
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";
        
        // Loop terbalik agar data terbaru berada di atas, tapi membawa index aslinya
        for (let i = database.length - 1; i >= 0; i--) {
            const item = database[i];
            const row = `<tr>
                <td>
                    <button class="btn-edit" onclick="editData(${i})">✏️ Edit</button>
                    <button class="btn-delete" onclick="hapusData(${i})">❌</button>
                </td>
                <td><small>${item.Tanggal} (${item.Jam})</small></td>
                <td>${item.Bagian_Piket.replace("Piket ", "")}</td>
                <td><b>${item.Nama_Anggota}</b></td>
                <td><span class="badge bg-secondary">${item.Status}</span></td>
                <td><small>${item.Keterangan}</small></td>
            </tr>`;
            tableBody.insertAdjacentHTML('beforeend', row);
        }
    }

    // DOWNLOAD EXCEL BERDASARKAN SUB MENU (DATA TERBARU HASIL EDIT OTOMATIS IKUT UPDATE)
    function downloadExcelTerpisah() {
        const database = JSON.parse(localStorage.getItem("dataPiketOSIS")) || [];
        if (database.length === 0) {
            alert("Belum ada data absen!");
            return;
        }

        const workbook = XLSX.utils.book_new();

        const dataMenyambut = database.filter(item => item.Bagian_Piket === "Piket Menyambut");
        const dataTangga = database.filter(item => item.Bagian_Piket === "Piket Jaga Tangga");
        const dataSholat = database.filter(item => item.Bagian_Piket === "Piket Persiapan Sholat");

        if(dataMenyambut.length > 0) {
            XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(dataMenyambut), "Piket Menyambut");
        }
        if(dataTangga.length > 0) {
            XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(dataTangga), "Jaga Tangga");
        }
        if(dataSholat.length > 0) {
            XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(dataSholat), "Persiapan Sholat");
        }

        XLSX.writeFile(workbook, "Laporan_Piket_Terupdate.xlsx");
    }
</script>

</body>
</html>
